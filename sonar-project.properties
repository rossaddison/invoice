sonar.projectKey=rossaddison_invoice
sonar.organization=rossaddison
sonar.projectName=Invoice Application
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Sources and tests
sonar.sources=src,config,public
sonar.tests=Tests,src/typescript
sonar.exclusions=vendor/**,runtime/**,public/assets/**,nbproject/**,docker/**,src/Invoice/Asset/**,e.g.ini/**,resources/messages/**

# Language versions
sonar.php.version=8.4

# Rule exclusions
# IMPORTANT: sonar.issue.ignore.multicriteria must be a single comma-separated value.
# Duplicate keys silently drop all but the last, so e1,e2 must be listed together.
sonar.issue.ignore.multicriteria=e1,e2
# e1: snake_case property names in infrastructure persistence entities match DB column names (php:S116)
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S116
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.php
# e2: private readonly fields are used by traits connected to the class (php:S1068)
sonar.issue.ignore.multicriteria.e2.ruleKey=php:S1068
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.php

# CPD (copy-paste detection) exclusions — data/lookup-table files that are
# inherently repetitive by UBL/Peppol/StoreCove specification design.
# Full bug and smell analysis still runs; only duplication counting is suppressed.
sonar.cpd.exclusions=src/Invoice/Helpers/Peppol/**,src/Invoice/Helpers/StoreCove/StoreCoveArrays.php,src/Widget/SalesOrderToolbar.php

# Coverage reports
sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPath=test-results.xml
# SonarCloud's JS plugin handles both JS and TS — there is no separate sonar.typescript key
sonar.javascript.lcov.reportPaths=coverage/lcov.info
