# SonarQube Project Configuration
sonar.projectKey=rossaddison_invoice
sonar.organization=rossaddison
sonar.projectName=Invoice Application
sonar.projectVersion=1.0
sonar.php.coverage.reportPaths=coverage.xml

# Source code configuration
sonar.sources=src,config,public
sonar.tests=Tests
sonar.sourceEncoding=UTF-8

# Language-specific settings
sonar.php.version=8.4

# Rule exclusions
# Infrastructure persistence entities use snake_case property names to match DB column names (php:S116)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S116
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.php

# Exclusions
sonar.exclusions=vendor/**,runtime/**,public/assets/**,nbproject/**,docker/**,src/Invoice/Asset/**,e.g.ini/**,resources/messages/**

# Test exclusions
sonar.test.exclusions=Tests/**

# Coverage reports (if you have them)
# C:\wamp64\www\invoice>set XDEBUG_MODE=coverage
# C:\wamp64\www\invoice>php -d memory_limit=512M vendor/bin/phpunit --coverage-clover coverage.xml --log-junit test-results.xml
# PHPUnit 13.0.6 by Sebastian Bergmann and contributors.
# Runtime:       PHP 8.4.15 with Xdebug 3.4.7
# Configuration: C:\wamp64\www\invoice\phpunit.xml.dist
# .....................................                             37 / 37 (100%)
# Time: 00:00.989, Memory: 96.00 MB
# OK (37 tests, 48 assertions)
# Generating code coverage report in Clover XML format ... done [00:41.901]

sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPath=test-results.xml
