# Claude – HTML Encoding Safety Review
#
# PURPOSE
# -------
# This workflow guards against two classes of HTML encoding bug that static
# analysis (Psalm, PHPStan) cannot catch without extensive annotation work:
#
#   1. MISSING Html::encode() — XSS risk
#      PHP view files do not auto-escape output. A raw <?= $var ?> in a template
#      is an XSS vulnerability if $var contains user-supplied data. Unlike Twig,
#      which escapes by default, PHP templates require the developer to opt in to
#      safety on every output line.
#
#   2. DOUBLE Html::encode() — display corruption bug
#      Yii3's Field widgets (yiisoft/form-model) and Html Tag classes
#      (yiisoft/html) encode attribute values internally. Wrapping the value in
#      Html::encode() before passing it to ->value() or addInputAttributes()
#      causes double-encoding: apostrophes render as &#039;, ampersands as &amp;
#      etc., corrupting form field display for names and special characters.
#
# THE $doubleEncode PARAMETER TRAP
# ----------------------------------
# Html::encode() has a second parameter: $doubleEncode = true (default).
# When true, it will encode an already-encoded entity a second time:
#
#   Html::encode("O'Brien")             => "O&#039;Brien"   (correct)
#   Html::encode("O&#039;Brien")        => "O&amp;#039;Brien" (double-encoded)
#
# The default true means calling Html::encode() on a value that has already
# been encoded — either by a previous Html::encode() call or by a Field widget
# internally — will corrupt the output. Passing false as the second argument
# prevents re-encoding of existing entities, but does NOT make it safe to wrap
# Field widget values in Html::encode(): the Field still encodes the result,
# producing &amp; for any & introduced by Html::encode($x, false).
#
# The only safe rule: never pass Html::encode() output into a Field widget.
# Let the widget encode the raw value itself.
#
# WHY A WORKFLOW AND NOT A LINTER?
# ---------------------------------
# Psalm taint analysis would cover case 1, but requires @psalm-taint-source,
# @psalm-taint-escape, and @psalm-taint-sink annotations throughout yiisoft/html
# and yiisoft/form-model — annotations those packages do not ship. A custom
# PHPStan rule could catch case 2 but would need ongoing maintenance as widget
# APIs evolve. This workflow provides equivalent coverage with zero annotation
# overhead by reviewing only the files changed in each PR.
#
# SCOPE
# -----
# Triggers on any PHP file change in a pull request. Reviews changed files only —
# it does not re-audit the entire codebase on every PR.

name: Claude – HTML Encoding Safety Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**/*.php'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-encoding-review:
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a PHP security reviewer focused exclusively on HTML encoding
            correctness in a Yii3 codebase that uses yiisoft/html and
            yiisoft/form-model.

            Review the changed PHP files in this pull request and look for
            exactly two categories of issue:

            ---

            ## 1. Missing `Html::encode()` — XSS Risk

            Flag any raw output of a variable in a PHP template that is not
            wrapped in `Html::encode()`. Patterns to flag:

            - `<?= $variable ?>`
            - `<?= $form->getSomething() ?>`
            - `echo $variable;`

            Do NOT flag:
            - `<?= Html::encode($x) ?>` — already safe
            - `<?= $translator->translate('...') ?>` — translation keys are not
              user-supplied
            - `<?= $urlGenerator->generate(...) ?>` — URL generator output
            - `<?= $csrf ?>` — framework-managed token
            - Integer or boolean casts: `<?= (int) $x ?>`, `<?= (bool) $x ?>`
            - `<?= $field->render() ?>` — Field widget handles its own encoding
            - Intentionally raw HTML output marked with a comment `// raw HTML`

            ---

            ## 2. Double-encoding — Display Corruption Bug

            Flag any `Html::encode()` call whose result is passed to a
            yiisoft/form-model Field widget or yiisoft/html Tag method that
            already encodes internally. Patterns to flag:

            - `->value(Html::encode($x))` on any `Field::*` widget
            - `'value' => Html::encode($x)` inside `->addInputAttributes([...])`
            - `$optionsData[...] = Html::encode($x)` where `$optionsData` is
              passed to `->optionsData()`
            - `->attribute('attrName', Html::encode($x))` on any Tag class

            Do NOT flag:
            - `->content(Html::encode($x))` — `content()` does NOT auto-encode,
              so manual encoding here is correct
            - `Html::encode()` in raw string concatenation outside of widget
              calls, e.g. `'<pre>' . Html::encode($xml) . '</pre>'`
            - `Html::encode()` in direct `echo` or `<?= ?>` output in templates

            ---

            For each issue found:
            - State the file path and line number
            - Quote the exact line
            - State which category it falls into (Missing encode / Double-encode)
            - Provide the corrected line

            If no issues are found in the changed files, say so explicitly.
            Do not report issues in unchanged files.
