# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for rossaddison/invoice (Yii3-i)
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit
#
# Install the GitHub App first: https://github.com/apps/coderabbitai

language: "en-US"
early_access: false
tone_instructions: "Be direct and specific. Reference exact file paths and line numbers. Prefer short actionable comments over long explanations."

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false
  review_status: true
  collapse_walkthrough: false
  abort_on_close: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "as4"

  # Exclude generated, vendored, and lock files from review.
  path_filters:
    - "!vendor/**"
    - "!node_modules/**"
    - "!angular/node_modules/**"
    - "!angular/dist/**"
    - "!src/Invoice/Language/**"
    - "!*.min.js"
    - "!*.min.css"
    - "!composer.lock"
    - "!package-lock.json"
    - "!yarn.lock"

  path_instructions:

    # ── PHP — general ─────────────────────────────────────────────────────────
    - path: "src/**/*.php"
      instructions: |
        Standards: PSR-1, PSR-12. PHP 8.4+ minimum — use enums, readonly properties,
        named arguments, property hooks, and asymmetric visibility where appropriate.
        Always write "UBL 2.4", never "UBL 2.1".

        Psalm: all code must pass Psalm errorLevel 1. Never suggest @psalm-suppress.
        Flag any added @psalm-suppress as a blocker.

        SonarQube — flag as issues:
        - String literals appearing 3+ times → suggest UPPER_SNAKE_CASE PHP constant
          or class constant. UBL/Peppol/ebMS3 identifiers → suggest UblConstants or
          PeppolConstants file. Translation keys hardcoded in multiple places.
        - S107: constructor with >7 parameters.
        - S1142: method with >3 return statements — suggest extraction.
        - S112: throw new \Exception or \RuntimeException directly — use a dedicated
          named exception class.
        - S3415 in tests: assertSame(actual, expected) — expected must be first arg.

        PSR-7 responses: never return factory->createResponse(htmlString) — that
        JSON-encodes HTML. Use getRedirectResponse() + flashMessage() instead.

        Forms: static show(Entity): self pattern only; never new Form($entity)
        in the constructor.

        Translation strings: edit only resources/messages/en/app.php;
        src/Invoice/Language/ is auto-generated.

    # ── DDD infrastructure persistence ───────────────────────────────────────
    - path: "src/Infrastructure/Persistence/**/*.php"
      instructions: |
        Cycle ORM entities:
        - reqId(): int throws \LogicException when unpersisted; never getId(): string.
        - isPersisted() checks isset($this->id) — must be present and testable.
        - reqUserId() must pass $this->user_id (not $this->id) to requireId() —
          recurring copy-paste bug pattern.

        Migration is only complete when: old src/Invoice/Entity/{Name}.php deleted,
        all controllers/services/repositories/forms updated to new FQCN, view @var
        annotations updated, PHPUnit test exists and passes Psalm errorLevel 1.

    # ── AS4 / eDelivery ──────────────────────────────────────────────────────
    - path: "src/Invoice/As4/**/*.php"
      instructions: |
        eDelivery AS4 2.0 / ebMS3 compliance:
        - Namespace URIs must match As4Constants (SOAP_NS, EBMS3_NS, WSS_NS, etc.).
        - As4Receiver must throw As4ParseException, never \Exception or \RuntimeException.
        - Receipt signals must include SHA-256 NRR digest per §5.1.8.
        - As4ErrorSignal category must be As4ErrorCategory enum; severity must be
          As4ErrorSeverity enum — never raw strings.
        - As4MessageState::received is for inbound messages; outbound lifecycle is
          pending → sent → receiptReceived | failed.
        - SonarQube S107: controller constructor ≤ 7 params.
        - SonarQube S1142: use match(true) dispatch to keep return count ≤ 3.
        - As4SecurityHandler::verifySignature() is a known placeholder — flag any PR
          that ships it to production without real XML-DSIG verification.

    # ── PHPUnit tests ─────────────────────────────────────────────────────────
    - path: "Tests/**/*.php"
      instructions: |
        PHPUnit 13:
        - Attribute syntax only: #[\PHPUnit\Framework\Attributes\DataProvider],
          not @dataProvider docblock.
        - Intersection types for mocks: SomeInterface&MockObject.
        - Fixture pattern: private createFixture() returning a typed fixture class;
          no setUp(). No markTestSkipped() as a workaround — mock the dependency.
        - Never add @psalm-suppress — tests must pass Psalm errorLevel 1 too.
        - Test markers S, I, R, D, N, W are failures; only . (pass) is acceptable.
        - PHPUnit notices from Cycle ORM createMock() are pre-existing and acceptable.
        - assertSame(expected, actual) — expected value is always the first argument.

    # ── TypeScript / Angular ──────────────────────────────────────────────────
    - path: "**/*.ts"
      instructions: |
        Never use `window` — always use `globalThis` (SonarQube typescript:S7764).
        No unused variables or imports.
        HTMX partial refresh: use fetch + DOMParser + replaceWith + htmx.process.
        Do not use htmx.ajax with select — unreliable for partial swaps.
        MobilePreviewToggle is inline in view heredocs (inv/index.php, inv/guest.php);
        mobile-preview.ts is dead code — do not extend it.

    # ── Views ────────────────────────────────────────────────────────────────
    - path: "resources/views/**/*.php"
      instructions: |
        View @var annotations must use the infrastructure FQCN
        (App\Infrastructure\Persistence\{Name}\{Name}), not src/Invoice/Entity/.
        Do not use Bootstrap 5 input-group or input-group-text — use small.text-muted
        or a plain span instead (recurring layout breakage).
        HtmxAsset must be registered in the specific view file for non-invoice pages;
        the main layout does not load it globally.

    # ── DI config ────────────────────────────────────────────────────────────
    - path: "config/**/*.php"
      instructions: |
        Yii3 DI config. New files under config/common/di/ are auto-discovered by
        glob — no manual entry in .merge-plan.php needed.
        Preserve constructor injection patterns; do not use service locators.

knowledge_base:
  learnings:
    scope: local
  issues:
    scope: local

chat:
  auto_reply: true
